name: CI - Six-Nines Gate
on: 
  pull_request:
  push:
    branches: [main]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

  matrix:
    needs: setup
    strategy: 
      matrix: 
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      
      # Build & Type Check
      - name: Build all packages
        run: pnpm -r build --if-present
      - name: Lint & Type Check
        run: |
          pnpm -r --if-present lint
          pnpm -r --if-present typecheck

      # Test Suite
      - name: Unit Tests
        run: pnpm -r --if-present test:unit
      - name: Property Tests
        run: pnpm -r --if-present test:property
        continue-on-error: true
      - name: Mutation Tests
        run: pnpm -r --if-present test:mutation
        continue-on-error: true

      # Quality Assurance
      - name: Performance Check
        run: pnpm -r --if-present qa:perf
        continue-on-error: true
      - name: Security Scan
        run: pnpm -r --if-present qa:security
        continue-on-error: true

      # Evidence Bundle
      - name: Generate Evidence Bundle
        run: pnpm -r --if-present evidence:bundle
        continue-on-error: true
      
      # Upload Artifacts
      - uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest' && matrix.node == 20
        with: 
          name: evidence-bundle
          path: packages/evidence/dist/
      

  verify_evidence:
    name: verify-evidence
    needs: [matrix]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Download Evidence
        uses: actions/download-artifact@v4
        with:
          name: evidence-bundle
          path: ./_evidence
        continue-on-error: true
      - name: Check artifact presence
        run: |
          if [ -f ./_evidence/index.html ]; then
            echo "✓ Evidence bundle found"
          else
            echo "⚠ Evidence bundle not yet generated (expected during bootstrap)"
          fi

  verify_six_nines:
    name: verify-six-nines
    needs: [verify_evidence]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: evidence-bundle
          path: ./_evidence
        continue-on-error: true
      - name: Verify F_total ≤ 1e-6
        run: |
          if [ -f packages/qa/scripts/verify-six-nines.js ]; then
            node packages/qa/scripts/verify-six-nines.js
          else
            echo "⚠ Six-nines verification script not found (bootstrap phase)"
          fi
